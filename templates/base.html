<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}IMS{% endblock %}</title>
  <script>
    (function() {
      var t = localStorage.getItem('ims-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    :root, [data-theme="dark"] {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --danger: #f85149;
      --success: #3fb950;
    }
    [data-theme="light"] {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --border: #e1e4e8;
      --text: #1f2328;
      --text-muted: #656d76;
      --accent: #0969da;
      --accent-hover: #0550ae;
      --danger: #cf222e;
      --success: #1a7f37;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .container { max-width: 420px; margin: 0 auto; padding: 24px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 24px; }
    label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 6px; color: var(--text-muted); }
    input[type="text"], input[type="password"], input[type="email"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      margin-bottom: 16px;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .btn {
      display: inline-block;
      padding: 10px 18px;
      font-size: 0.9375rem;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost { background: transparent; color: var(--text-muted); }
    .btn-ghost:hover { color: var(--text); }
    .messages { margin-bottom: 16px; }
    .message { padding: 10px 12px; border-radius: 8px; margin-bottom: 8px; font-size: 0.875rem; }
    .message.error { background: rgba(248,81,73,0.15); color: #f85149; }
    .message.success { background: rgba(63,185,80,0.15); color: #3fb950; }
    .message.warning { background: rgba(210,153,34,0.15); color: #d29922; }
    .text-center { text-align: center; }
    .mt { margin-top: 24px; }
    .muted { color: var(--text-muted); font-size: 0.875rem; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% block body %}
  <div class="container">
    {% if messages %}
    <div class="messages">
      {% for message in messages %}
      <div class="message {{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
  {% endblock %}
  {% block extra_js %}{% endblock %}
</body>
</html>
