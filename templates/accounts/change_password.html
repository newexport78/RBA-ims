{% extends "base.html" %}
{% block title %}Set new password — IMS{% endblock %}
{% block content %}
<div class="card">
  <h1 class="text-center">Set new password</h1>
  <p class="muted text-center" style="margin-bottom: 20px;">You must set a new password before continuing.</p>
  <form method="post" action="{% url 'accounts:change_password' %}">
    {% csrf_token %}
    <label for="password">New password</label>
    <input type="password" id="password" name="password" required minlength="8" placeholder="At least 8 characters" autocomplete="new-password">
    <label for="confirm">Confirm password</label>
    <input type="password" id="confirm" name="confirm" required minlength="8" placeholder="Repeat new password" autocomplete="new-password">
    <button type="submit" class="btn btn-primary">Update password and continue</button>
  </form>
</div>
{% endblock %}
