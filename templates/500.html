<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error — IMS</title>
  <style>
    :root { --bg: #0f1419; --text: #e6edf3; --text-muted: #8b949e; --accent: #58a6ff; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { max-width: 420px; text-align: center; }
    h1 { font-size: 1.5rem; margin-bottom: 12px; }
    p { color: var(--text-muted); margin-bottom: 20px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Something went wrong</h1>
    <p>We have been notified. Please try again later.</p>
    <p><a href="/">Go to login</a></p>
  </div>
</body>
</html>
